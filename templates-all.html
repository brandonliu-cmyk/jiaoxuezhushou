<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>精选教学模板 - 兆涵科技 Sigma Education</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #F0F4F8; min-height: 100vh; }

    /* 顶部导航栏 */
    .top-nav {
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo { font-size: 22px; }
    .nav-brand { font-weight: 700; font-size: 15px; color: #1a1a2e; }
    .nav-brand span { font-weight: 400; font-size: 12px; color: #888; margin-left: 4px; }
    .nav-center { display: flex; gap: 28px; }
    .nav-center a { color: #555; text-decoration: none; font-size: 14px; font-weight: 500; transition: color .2s; }
    .nav-center a:hover, .nav-center a.active { color: #1B5EA7; }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-right-item { font-size: 13px; color: #666; cursor: pointer; }
    .quota-tag { background: #E8F4FD; color: #1B5EA7; padding: 4px 12px; border-radius: 16px; font-size: 12px; }
    .avatar { width: 34px; height: 34px; background: linear-gradient(135deg, #1B5EA7, #0D47A1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }

    /* 面包屑 */
    .page-header { background: #fff; border-bottom: 1px solid #E8EEF4; padding: 12px 32px; }
    .breadcrumb { font-size: 13px; color: #888; }
    .breadcrumb span { color: #1a1a2e; font-weight: 500; }

    /* 主内容 */
    .main-content {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 32px;
    }

    /* 页面标题 */
    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    .page-subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }

    /* 模板网格 */
    .template-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    /* 模板卡片 */
    .template-card {
      background: #fff;
      border-radius: 12px;
      border: 1.5px solid #E8EEF4;
      cursor: pointer;
      transition: all 0.25s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .template-card:hover {
      border-color: #1B5EA7;
      box-shadow: 0 4px 16px rgba(27, 94, 167, 0.12);
      transform: translateY(-2px);
    }
    .card-top {
      padding: 16px 16px 12px;
      flex: 1;
    }
    .card-meta {
      margin-bottom: 10px;
    }
    .card-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      background: #FFF3E0;
      color: #E65100;
      margin-right: 6px;
    }
    .card-badge.blue { background: #E3F2FD; color: #1565C0; }
    .card-badge.purple { background: #F3E5F5; color: #7B1FA2; }
    .card-badge.green { background: #E8F5E9; color: #2E7D32; }
    .card-badge.teal { background: #E0F2F1; color: #00796B; }
    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .card-desc {
      font-size: 12px;
      color: #666;
      line-height: 1.6;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .card-footer {
      padding: 12px 16px;
      border-top: 1px solid #F0F4F8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-tag { font-size: 12px; color: #888; }
    .card-use-btn {
      font-size: 12px;
      color: #1B5EA7;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 6px;
      background: #E3F2FD;
      transition: all 0.2s;
    }
    .card-use-btn:hover {
      background: #1B5EA7;
      color: #fff;
    }

    /* 筛选和搜索栏 */
    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-tabs {
      display: flex;
      gap: 8px;
    }
    .filter-tab {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid #E8EEF4;
      background: #fff;
      color: #666;
      transition: all 0.2s;
    }
    .filter-tab:hover {
      border-color: #1B5EA7;
      color: #1B5EA7;
    }
    .filter-tab.active {
      background: #1B5EA7;
      border-color: #1B5EA7;
      color: #fff;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      max-width: 320px;
      position: relative;
      margin-left: auto;
    }
    .search-box input {
      width: 100%;
      padding: 8px 16px 8px 36px;
      border: 1.5px solid #E8EEF4;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus {
      border-color: #1B5EA7;
    }
    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
    }

    /* 分页 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 32px;
      padding-bottom: 32px;
    }
    .page-btn {
      min-width: 36px;
      height: 36px;
      padding: 0 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      border: 1.5px solid #E8EEF4;
      background: #fff;
      color: #666;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page-btn:hover {
      border-color: #1B5EA7;
      color: #1B5EA7;
    }
    .page-btn.active {
      background: #1B5EA7;
      border-color: #1B5EA7;
      color: #fff;
    }
    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .page-info {
      font-size: 13px;
      color: #888;
      margin: 0 8px;
    }
  </style>
</head>

      { id: 'plan4', type: 'plan', title: '小学二年级语文下学期教学工作计划', badge: '🔥 热门精选', badgeClass: 'blue', desc: '巩固拼音基础，加强识字写字教学，培养阅读兴趣', tag: '小学语文' },
      { id: 'plan5', type: 'plan', title: '小学五年级数学下学期教学工作计划', badge: '⭐ 编辑推荐', badgeClass: 'purple', desc: '注重小数、分数运算能力培养，加强解决问题能力训练', tag: '小学数学' },
      { id: 'plan6', type: 'plan', title: '初中八年级物理上学期教学工作计划', badge: '✨ 精品模板', badgeClass: 'green', desc: '注重实验探究与概念理解，培养科学思维能力', tag: '初中物理' },
      { id: 'plan7', type: 'plan', title: '高中一年级数学上学期教学工作计划', badge: '🔥 热门精选', badgeClass: 'blue', desc: '注重函数与数列学习，培养数学抽象与逻辑推理能力', tag: '高中数学' },
      { id: 'plan8', type: 'plan', title: '小学四年级英语上学期教学工作计划', badge: '⭐ 编辑推荐', badgeClass: 'purple', desc: '强化单词记忆与句型练习，培养简单口语交际能力', tag: '小学英语' },

      // 校园活动策划
      { id: 'event1', type: 'event', title: '国庆节主题校园活动策划方案', badge: '🔥 热门精选', badgeClass: '', desc: '庆祝中华人民共和国成立，培养学生爱国情怀与民族自豪感', tag: '主题活动' },
      { id: 'event2', type: 'event', title: '秋季趣味运动会活动策划方案', badge: '⭐ 编辑推荐', badgeClass: 'purple', desc: '丰富校园文化生活，增强学生体质，培养团队协作精神', tag: '体育活动' },
      { id: 'event3', type: 'event', title: '校园读书节活动策划方案', badge: '✨ 精品模板', badgeClass: 'green', desc: '营造书香校园氛围，培养学生阅读习惯与文学素养', tag: '文化活动' },
      { id: 'event4', type: 'event', title: '六一儿童节文艺汇演策划方案', badge: '🔥 热门精选', badgeClass: 'blue', desc: '展示学生才艺，培养舞台表现力，营造欢乐节日氛围', tag: '文艺活动' },
      { id: 'event5', type: 'event', title: '消防安全教育活动策划方案', badge: '⭐ 编辑推荐', badgeClass: 'purple', desc: '普及消防安全知识，提高学生安全意识与自护能力', tag: '安全教育' },
      { id: 'event6', type: 'event', title: '校园科技创新大赛策划方案', badge: '✨ 精品模板', badgeClass: 'green', desc: '激发学生创新思维，培养科学探究精神与实践能力', tag: '科技活动' },
      { id: 'event7', type: 'event', title: '清明节祭英烈活动策划方案', badge: '🔥 热门精选', badgeClass: 'blue', desc: '缅怀革命先烈，传承红色基因，进行爱国主义教育', tag: '主题活动' },
      { id: 'event8', type: 'event', title: '校园环保主题活动策划方案', badge: '⭐ 编辑推荐', badgeClass: 'purple', desc: '增强环保意识，培养绿色生活习惯，共建美丽校园', tag: '主题活动' },
      { id: 'event9', type: 'event', title: '母亲节感恩教育活动策划方案', badge: '✨ 精品模板', badgeClass: 'green', desc: '培养学生感恩意识，增进亲子感情，弘扬中华传统美德', tag: '感恩教育' },

      // 家长会发言稿
      { id: 'speech1', type: 'speech', title: '三年级新学期家长会发言稿', badge: '🔥 热门精选', badgeClass: 'blue', desc: '介绍班级情况，分析学生特点，提出家校配合建议', tag: '小学' },
      { id: 'speech2', type: 'speech', title: '初一年级新生入学家长会发言稿', badge: '⭐ 编辑推荐', badgeClass: 'purple', desc: '帮助家长了解初中学习特点，建立良好家校沟通', tag: '初中' },
      { id: 'speech3', type: 'speech', title: '期中考试后家长会发言稿', badge: '✨ 精品模板', badgeClass: 'green', desc: '分析期中考试成绩，提出后半学期学习建议', tag: '通用' },
      { id: 'speech4', type: 'speech', title: '六年级毕业班家长会发言稿', badge: '🔥 热门精选', badgeClass: 'blue', desc: '分析升学形势，提供备考建议，助力小升初衔接', tag: '小学' },
      { id: 'speech5', type: 'speech', title: '高中一年级家长会发言稿', badge: '⭐ 编辑推荐', badgeClass: 'purple', desc: '帮助家长适应高中阶段，关注学生心理变化与学业发展', tag: '高中' },
      { id: 'speech6', type: 'speech', title: '小学低年级家长会发言稿', badge: '✨ 精品模板', badgeClass: 'green', desc: '关注习惯养成，培养学习兴趣，建立家校信任', tag: '小学' },
      { id: 'speech7', type: 'speech', title: '期末总结家长会发言稿', badge: '🔥 热门精选', badgeClass: 'blue', desc: '全面总结学期工作，表彰优秀学生，布置寒假安排', tag: '通用' },
      { id: 'speech8', type: 'speech', title: '中考百日誓师大会发言稿', badge: '⭐ 编辑推荐', badgeClass: 'purple', desc: '激励初三学子，明确奋斗目标，营造良好备考氛围', tag: '初中' }
    ];

    var PAGE_SIZE = 12;
    var currentPage = 1;
    var currentType = 'all';
    var currentSearch = '';

    function getFilteredTemplates() {
      var filtered = allTemplates;

      // 按类型筛选
      if (currentType !== 'all') {
        filtered = filtered.filter(function(item) { return item.type === currentType; });
      }

      // 按关键词搜索
      if (currentSearch) {
        var kw = currentSearch.toLowerCase();
        filtered = filtered.filter(function(item) {
          return item.title.toLowerCase().indexOf(kw) !== -1 ||
                 item.desc.toLowerCase().indexOf(kw) !== -1 ||
                 item.tag.toLowerCase().indexOf(kw) !== -1;
        });
      }

      return filtered;
    }

    function renderTemplates() {
      var filtered = getFilteredTemplates();
      var grid = document.getElementById('templateGrid');
      var paginationEl = document.getElementById('pagination');

      if (filtered.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#888;">未找到相关模板</div>';
        paginationEl.style.display = 'none';
        return;
      }

      // 计算分页
      var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;

      var start = (currentPage - 1) * PAGE_SIZE;
      var end = start + PAGE_SIZE;
      var pageItems = filtered.slice(start, end);

      grid.innerHTML = '';

      pageItems.forEach(function(item) {
        var card = document.createElement('div');
        card.className = 'template-card';
        card.innerHTML =
          '<div class="card-top">' +
            '<div class="card-meta">' +
              '<span class="card-badge ' + item.badgeClass + '">' + item.badge + '</span>' +
            '</div>' +
            '<div class="card-title">' + item.title + '</div>' +
            '<div class="card-desc">' + item.desc + '</div>' +
          '</div>' +
          '<div class="card-footer">' +
            '<span class="card-tag">' + item.tag + '</span>' +
            '<span class="card-use-btn" onclick="event.stopPropagation();useTemplate(\'' + item.id + '\')">立即使用 →</span>' +
          '</div>';
        card.onclick = function() { previewTemplate(item.id); };
        grid.appendChild(card);
      });

      // 渲染分页
      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      var paginationEl = document.getElementById('pagination');
      paginationEl.innerHTML = '';

      if (totalPages <= 1) {
        paginationEl.style.display = 'none';
        return;
      }

      paginationEl.style.display = 'flex';

      // 上一页
      var prevBtn = document.createElement('button');
      prevBtn.className = 'page-btn';
      prevBtn.textContent = '‹';
      prevBtn.disabled = currentPage === 1;
      prevBtn.onclick = function() { currentPage--; renderTemplates(); };
      paginationEl.appendChild(prevBtn);

      // 页码
      var startPage = Math.max(1, currentPage - 2);
      var endPage = Math.min(totalPages, currentPage + 2);

      if (startPage > 1) {
        var firstBtn = document.createElement('button');
        firstBtn.className = 'page-btn';
        firstBtn.textContent = '1';
        firstBtn.onclick = function() { currentPage = 1; renderTemplates(); };
        paginationEl.appendChild(firstBtn);
        if (startPage > 2) {
          var ellipsis = document.createElement('span');
          ellipsis.textContent = '...';
          ellipsis.style.cssText = 'color:#888;padding:0 4px;';
          paginationEl.appendChild(ellipsis);
        }
      }

      for (var i = startPage; i <= endPage; i++) {
        var btn = document.createElement('button');
        btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
        btn.textContent = i;
        btn.onclick = function() { currentPage = parseInt(this.textContent); renderTemplates(); };
        paginationEl.appendChild(btn);
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          var ellipsis2 = document.createElement('span');
          ellipsis2.textContent = '...';
          ellipsis2.style.cssText = 'color:#888;padding:0 4px;';
          paginationEl.appendChild(ellipsis2);
        }
        var lastBtn = document.createElement('button');
        lastBtn.className = 'page-btn';
        lastBtn.textContent = totalPages;
        lastBtn.onclick = function() { currentPage = totalPages; renderTemplates(); };
        paginationEl.appendChild(lastBtn);
      }

      // 下一页
      var nextBtn = document.createElement('button');
      nextBtn.className = 'page-btn';
      nextBtn.textContent = '›';
      nextBtn.disabled = currentPage === totalPages;
      nextBtn.onclick = function() { currentPage++; renderTemplates(); };
      paginationEl.appendChild(nextBtn);

      // 页码信息
      var info = document.createElement('span');
      info.className = 'page-info';
      info.textContent = '第 ' + currentPage + ' / ' + totalPages + ' 页，共 ' + getFilteredTemplates().length + ' 条';
      paginationEl.appendChild(info);
    }

    function previewTemplate(id) {
      var item = allTemplates.find(function(t) { return t.id === id; });
      if (!item) return;

      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML =
        '<div style="background:#fff;border-radius:16px;max-width:900px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.2);">' +
          '<div style="background:#1B5EA7;color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">' +
            '<div>' +
              '<div style="font-size:14px;font-weight:600;">📋 ' + item.title + '</div>' +
              '<div style="font-size:11px;opacity:0.8;margin-top:2px;">精选模板 · ' + item.tag + '</div>' +
            '</div>' +
            '<div style="display:flex;gap:8px;align-items:center;">' +
              '<button id="tmplDownloadBtn" style="background:rgba(255,255,255,.9);border:none;color:#1B5EA7;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;">⬇ 下载</button>' +
              '<button id="tmplCloseBtn" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;">关闭</button>' +
            '</div>' +
          '</div>' +
          '<div id="tmplBody" style="flex:1;overflow-y:auto;padding:28px 32px;font-size:14px;line-height:2;color:#444;">' +
            '<p style="color:#888;text-align:center;padding:60px;">请返回首页使用此模板生成内容</p>' +
          '</div>' +
        '</div>';
      overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);

      document.getElementById('tmplCloseBtn').onclick = function() { overlay.remove(); };
      document.getElementById('tmplDownloadBtn').onclick = function() {
        var content = item.title + '\n\n' + item.desc;
        var blob = new Blob([String.fromCharCode(0xFEFF) + content], { type: 'text/plain;charset=utf-8' });
        var link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = item.title + '.txt';
        link.click();
        var b = document.getElementById('tmplDownloadBtn');
        b.textContent = '✅ 已下载';
        setTimeout(function() { b.textContent = '⬇ 下载'; }, 1500);
      };
    }

    function useTemplate(id) {
      window.location.href = 'index.html?template=' + id;
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      renderTemplates();

      // 筛选标签点击
      document.querySelectorAll('.filter-tab').forEach(function(tab) {
        tab.onclick = function() {
          document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
          this.classList.add('active');
          currentType = this.getAttribute('data-type');
          currentPage = 1;
          renderTemplates();
        };
      });

      // 搜索输入
      var searchInput = document.getElementById('searchInput');
      var searchTimer;
      searchInput.oninput = function() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(function() {
          currentSearch = searchInput.value.trim();
          currentPage = 1;
          renderTemplates();
        }, 300);
      };
    });
  </script>
</body>
</html>
