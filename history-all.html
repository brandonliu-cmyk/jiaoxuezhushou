<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史记录 - 兆涵科技 Sigma Education</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #F0F4F8; min-height: 100vh; }

    /* 顶部导航栏 */
    .top-nav {
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-left { display: flex; align-items: center; gap: 10px; }
    .nav-logo { font-size: 22px; }
    .nav-brand { font-weight: 700; font-size: 15px; color: #1a1a2e; }
    .nav-brand span { font-weight: 400; font-size: 12px; color: #888; margin-left: 4px; }
    .nav-center { display: flex; gap: 28px; }
    .nav-center a { color: #555; text-decoration: none; font-size: 14px; font-weight: 500; transition: color .2s; }
    .nav-center a:hover, .nav-center a.active { color: #1B5EA7; }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-right-item { font-size: 13px; color: #666; cursor: pointer; }
    .quota-tag { background: #E8F4FD; color: #1B5EA7; padding: 4px 12px; border-radius: 16px; font-size: 12px; }
    .avatar { width: 34px; height: 34px; background: linear-gradient(135deg, #1B5EA7, #0D47A1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }

    /* 面包屑 */
    .page-header { background: #fff; border-bottom: 1px solid #E8EEF4; padding: 12px 32px; }
    .breadcrumb { font-size: 13px; color: #888; }
    .breadcrumb span { color: #1a1a2e; font-weight: 500; }

    /* 主内容 */
    .main-content {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 32px;
    }

    /* 页面标题 */
    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    .page-subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }

    /* 历史网格 */
    .history-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    /* 历史卡片 */
    .history-card {
      background: #fff;
      border-radius: 12px;
      border: 1.5px solid #E8EEF4;
      cursor: pointer;
      transition: all 0.25s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .history-card:hover {
      border-color: #1B5EA7;
      box-shadow: 0 4px 16px rgba(27, 94, 167, 0.12);
      transform: translateY(-2px);
    }
    .card-top {
      padding: 16px 16px 12px;
      flex: 1;
    }
    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .card-desc {
      font-size: 12px;
      color: #666;
      line-height: 1.6;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .card-footer {
      padding: 12px 16px;
      border-top: 1px solid #F0F4F8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-level { font-size: 12px; color: #888; }
    .card-time { font-size: 12px; color: #aaa; margin-left: 8px; }
    .card-del {
      font-size: 12px;
      color: #ccc;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .card-del:hover {
      color: #E53935;
      background: #FFF0F0;
    }

    .history-card {
      position: relative;
    }

    .card-generating {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #FF9800;
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* 空状态 */
    .history-empty {
      text-align: center;
      padding: 80px 32px;
      color: #aaa;
    }
    .history-empty-icon { font-size: 48px; margin-bottom: 16px; }
    .history-empty-text { font-size: 16px; margin-bottom: 24px; }
    .history-empty-btn {
      display: inline-block;
      background: linear-gradient(135deg, #1B5EA7, #0D47A1);
      color: #fff;
      padding: 10px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .history-empty-btn:hover { opacity: 0.9; }

    /* 筛选和搜索栏 */
    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-tabs {
      display: flex;
      gap: 8px;
    }
    .filter-tab {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid #E8EEF4;
      background: #fff;
      color: #666;
      transition: all 0.2s;
    }
    .filter-tab:hover {
      border-color: #1B5EA7;
      color: #1B5EA7;
    }
    .filter-tab.active {
      background: #1B5EA7;
      border-color: #1B5EA7;
      color: #fff;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      max-width: 320px;
      position: relative;
      margin-left: auto;
    }
    .search-box input {
      width: 100%;
      padding: 8px 16px 8px 36px;
      border: 1.5px solid #E8EEF4;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus {
      border-color: #1B5EA7;
    }
    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
    }

    /* 分页 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 32px;
      padding-bottom: 32px;
    }
    .page-btn {
      min-width: 36px;
      height: 36px;
      padding: 0 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      border: 1.5px solid #E8EEF4;
      background: #fff;
      color: #666;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page-btn:hover {
      border-color: #1B5EA7;
      color: #1B5EA7;
    }
    .page-btn.active {
      background: #1B5EA7;
      border-color: #1B5EA7;
      color: #fff;
    }
    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .page-info {
      font-size: 13px;
      color: #888;
      margin: 0 8px;
    }
  </style>
</head>
<body>

  <!-- 顶部导航栏 -->
  <nav class="top-nav">
    <div class="nav-left">
      <div class="nav-logo">📋</div>
      <div class="nav-brand">兆涵科技 <span>Sigma Education</span></div>
    </div>
    <div class="nav-center">
      <a href="index.html">首页</a>
      <a href="#">智能备课</a>
      <a href="#">智能授课</a>
      <a href="#">智能测评</a>
      <a href="#" class="active">AI专区</a>
    </div>
    <div class="nav-right">
      <div class="nav-right-item quota-tag">📊 可用额度：200次</div>
      <div class="nav-right-item">📖 新手教程</div>
      <div class="nav-right-item">🔔</div>
      <div class="avatar">👩</div>
    </div>
  </nav>

  <!-- 面包屑 -->
  <div class="page-header">
    <div class="breadcrumb">AI专区 / <a href="index.html" style="color:#888;text-decoration:none;">智能助手</a> / <span>历史记录</span></div>
  </div>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="page-title">✦ 历史记录</div>
    <div class="page-subtitle">查看您所有的AI生成记录，方便重复使用和编辑</div>

    <!-- 筛选和搜索栏 -->
    <div class="filter-bar">
      <div class="filter-tabs" id="filterTabs">
        <div class="filter-tab active" data-type="all">全部</div>
        <div class="filter-tab" data-type="plan">教学工作计划</div>
        <div class="filter-tab" data-type="event">校园活动策划</div>
        <div class="filter-tab" data-type="speech">家长会发言稿</div>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索标题或内容关键词...">
      </div>
    </div>

    <div class="history-grid" id="historyGrid"></div>
    <div class="history-empty" id="historyEmpty" style="display:none;">
      <div class="history-empty-icon">📝</div>
      <div class="history-empty-text">暂无历史记录</div>
      <a href="index.html" class="history-empty-btn">去生成内容 →</a>
    </div>

    <!-- 分页 -->
    <div class="pagination" id="pagination"></div>
  </main>

  <script>
    var HISTORY_KEY = 'teaching_helper_history';
    var PAGE_SIZE = 12;
    var currentPage = 1;
    var currentType = 'all';
    var currentSearch = '';

    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
      catch (e) { return []; }
    }

    function saveHistory(list) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
    }

    function delHistory(id) {
      var list = getHistory().filter(function(item) { return item.id !== id; });
      saveHistory(list);
      renderHistory();
    }

    function getFilteredHistory() {
      var list = getHistory();
      var filtered = list;

      // 按类型筛选
      if (currentType !== 'all') {
        filtered = filtered.filter(function(item) { return item.type === currentType; });
      }

      // 按关键词搜索
      if (currentSearch) {
        var kw = currentSearch.toLowerCase();
        filtered = filtered.filter(function(item) {
          return item.title.toLowerCase().indexOf(kw) !== -1 ||
                 (item.content && item.content.toLowerCase().indexOf(kw) !== -1) ||
                 (item.desc && item.desc.toLowerCase().indexOf(kw) !== -1);
        });
      }

      return filtered;
    }

    function renderHistory() {
      var filtered = getFilteredHistory();
      var grid = document.getElementById('historyGrid');
      var emptyEl = document.getElementById('historyEmpty');
      var paginationEl = document.getElementById('pagination');

      if (filtered.length === 0) {
        grid.style.display = 'none';
        emptyEl.style.display = 'block';
        paginationEl.style.display = 'none';
        return;
      }

      grid.style.display = 'grid';
      emptyEl.style.display = 'none';
      paginationEl.style.display = 'flex';

      // 计算分页
      var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;

      var start = (currentPage - 1) * PAGE_SIZE;
      var end = start + PAGE_SIZE;
      var pageItems = filtered.slice(start, end);

      grid.innerHTML = '';

      pageItems.forEach(function(item) {
        var typeIcon = item.type === 'plan' ? '📋' : item.type === 'event' ? '🎉' : '🎤';
        var typeLabel = item.type === 'plan' ? '教学计划' : item.type === 'event' ? '校园活动' : '家长会';
        var isGenerating = item.generating === true;
        var generatingBadge = isGenerating ? '<span class="card-generating">生成中</span>' : '';

        var card = document.createElement('div');
        card.className = 'history-card';
        card.innerHTML =
          '<div class="card-top">' + generatingBadge +
            '<div class="card-title">' + typeIcon + ' ' + item.title + '</div>' +
            '<div class="card-desc">' + (item.desc || '') + '</div>' +
          '</div>' +
          '<div class="card-footer">' +
            '<div>' +
              '<span class="card-level">' + typeLabel + '</span>' +
              '<span class="card-time">' + item.time + '</span>' +
            '</div>' +
            '<span class="card-del" onclick="event.stopPropagation();delHistory(' + item.id + ')">✕ 删除</span>' +
          '</div>';
        card.onclick = function() {
          if (isGenerating) {
            var pageMap = { plan: 'plan-result.html', event: 'event-result.html', speech: 'speech-result.html' };
            window.location.href = pageMap[item.type] + '?id=' + item.id;
          } else {
            replayHistory(item);
          }
        };
        grid.appendChild(card);
      });

      // 渲染分页
      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      var paginationEl = document.getElementById('pagination');
      paginationEl.innerHTML = '';

      if (totalPages <= 1) return;

      // 上一页
      var prevBtn = document.createElement('button');
      prevBtn.className = 'page-btn';
      prevBtn.textContent = '‹';
      prevBtn.disabled = currentPage === 1;
      prevBtn.onclick = function() { currentPage--; renderHistory(); };
      paginationEl.appendChild(prevBtn);

      // 页码
      var startPage = Math.max(1, currentPage - 2);
      var endPage = Math.min(totalPages, currentPage + 2);

      if (startPage > 1) {
        var firstBtn = document.createElement('button');
        firstBtn.className = 'page-btn';
        firstBtn.textContent = '1';
        firstBtn.onclick = function() { currentPage = 1; renderHistory(); };
        paginationEl.appendChild(firstBtn);
        if (startPage > 2) {
          var ellipsis = document.createElement('span');
          ellipsis.textContent = '...';
          ellipsis.style.cssText = 'color:#888;padding:0 4px;';
          paginationEl.appendChild(ellipsis);
        }
      }

      for (var i = startPage; i <= endPage; i++) {
        var btn = document.createElement('button');
        btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
        btn.textContent = i;
        btn.onclick = function() { currentPage = parseInt(this.textContent); renderHistory(); };
        paginationEl.appendChild(btn);
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          var ellipsis2 = document.createElement('span');
          ellipsis2.textContent = '...';
          ellipsis2.style.cssText = 'color:#888;padding:0 4px;';
          paginationEl.appendChild(ellipsis2);
        }
        var lastBtn = document.createElement('button');
        lastBtn.className = 'page-btn';
        lastBtn.textContent = totalPages;
        lastBtn.onclick = function() { currentPage = totalPages; renderHistory(); };
        paginationEl.appendChild(lastBtn);
      }

      // 下一页
      var nextBtn = document.createElement('button');
      nextBtn.className = 'page-btn';
      nextBtn.textContent = '›';
      nextBtn.disabled = currentPage === totalPages;
      nextBtn.onclick = function() { currentPage++; renderHistory(); };
      paginationEl.appendChild(nextBtn);

      // 页码信息
      var info = document.createElement('span');
      info.className = 'page-info';
      info.textContent = '第 ' + currentPage + ' / ' + totalPages + ' 页，共 ' + getFilteredHistory().length + ' 条';
      paginationEl.appendChild(info);
    }

    // 初始化筛选和搜索
    document.addEventListener('DOMContentLoaded', function() {
      renderHistory();

      // 筛选标签点击
      document.querySelectorAll('.filter-tab').forEach(function(tab) {
        tab.onclick = function() {
          document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
          this.classList.add('active');
          currentType = this.getAttribute('data-type');
          currentPage = 1;
          renderHistory();
        };
      });

      // 搜索输入
      var searchInput = document.getElementById('searchInput');
      var searchTimer;
      searchInput.oninput = function() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(function() {
          currentSearch = searchInput.value.trim();
          currentPage = 1;
          renderHistory();
        }, 300);
      };
    });

    function replayHistory(item) {
      var typeMap = { plan: { icon: '📋', label: '教学计划', color: '#1B5EA7' }, event: { icon: '🎉', label: '校园活动', color: '#E65100' }, speech: { icon: '🎤', label: '家长会发言', color: '#7B1FA2' } };
      var info = typeMap[item.type] || typeMap.plan;

      var bodyHtml;
      // 检查是否有完整的生成内容（HTML格式，包含<h2>标签）
      if (item.content && item.content.indexOf('<h2>') !== -1) {
        // 有完整内容，直接使用
        bodyHtml = item.content + '<p style="color:#aaa;font-size:12px;margin-top:24px;border-top:1px dashed #ddd;padding-top:12px;">* 此为历史记录</p>';
      } else if (item.type === 'plan') {
        bodyHtml = '<h2>一、指导思想</h2><p>本计划依据《义务教育' + (item.content.match(/([^\n]{1,6})(年级|学段)/) || ['',''])[0] + '课程标准（2022年版）》及学校教学要求制定，以立德树人为根本任务，以核心素养为导向，注重知识与能力、过程与方法、情感态度与价值观的有机统一，致力于培养学生的核心素养，促进学生全面而有个性地发展。</p><h2>二、学情分析</h2><p>' + (item.content.match(/班级[^。\n]*学生[^。\n]*[。\n]?/g) || ['学生基本情况详见原始输入描述'])[0] + ' 针对不同层次的学生，教师应采取分层教学策略，确保每位学生都能在原有基础上获得进步。</p><h2>三、教学目标</h2><p>依据课程标准，结合学生实际，制定本学期教学目标如下：</p><ul><li>知识与技能目标：掌握本学期核心知识点与基本技能，形成完整的知识体系</li><li>过程与方法目标：通过自主探究、合作学习等方式，培养学科思维和解决问题的能力</li><li>情感态度与价值观目标：激发学生对学科学习的兴趣，养成严谨求实的学习态度</li></ul><h2>四、教学重难点</h2><p>教学重点：核心概念的深度理解与灵活运用，基础技能的熟练掌握与迁移应用</p><p>教学难点：综合性、开放性问题的分析思路与方法，学科核心素养的落地实践</p><h2>五、教学进度安排</h2><ul><li>第1-3周：第1单元内容学习与入学适应性教育</li><li>第4-6周：第2-3单元内容学习与阶段性巩固</li><li>第7-9周：第4-5单元内容学习与期中复习</li><li>第10周：期中质量检测与教学反思</li><li>第11-13周：第6-7单元内容学习</li><li>第14-16周：第8单元内容学习与期末系统复习</li><li>第17-20周：期末复习整理与质量检测</li></ul><h2>六、培优补差措施</h2><p>针对学生个体差异，实施个性化培养策略：培优措施对学有余力的学生提供拓展性学习资源；补差措施对学习困难学生给予更多关注与支持，加强基础知识的巩固与基本技能的训练。</p><h2>七、家校共育</h2><p>建立有效的家校沟通机制，通过家长群、家长会、家访等形式，定期向家长反馈学生学习情况，形成教育合力。</p><p style="color:#aaa;font-size:12px;margin-top:24px;border-top:1px dashed #ddd;padding-top:12px;">* 此为历史记录，原始输入内容：' + item.content.substring(0, 120) + (item.content.length > 120 ? '...' : '') + '</p>';
      } else if (item.type === 'event') {
        bodyHtml = '<h2>一、活动基本信息</h2><p>活动主题：' + (item.content.match(/[^，。\n]{2,20}(活动|策划|节|会|运动会|晚会)/) || [item.title])[0] + '</p><p>活动对象：' + (item.content.match(/面向[^，,]*学生|小学部[^，,]*|全校[^，,]*|初中[^，,]*|全段[^，,]*|全体[^，,]*生/) || ['全体学生'])[0] + '</p><p>时间与规模：' + (item.content.match(/\d{2,4}年\d{1,2}月\d{1,2}[日]?[~到至]\d{1,2}月\d{1,2}[日]?/) || ['待定']) + '</p><p>活动形式：' + (item.content.match(/[^\n]{1,20}(汇演|比赛|展示|教育|实践)/) || ['待定']) + '</p><h2>二、活动目标</h2><p>' + (item.content.match(/培养[^，。\n]{5,30}/) || ['通过本次活动，激发学生兴趣，培养综合素养'])[0] + '</p><h2>三、组织分工</h2><p>成立活动筹备小组，由学校领导担任组长，德育主任担任副组长，负责活动整体统筹；各年级组长负责本年级活动的具体落实；班主任负责学生动员与安全管理；总务处负责物资采购与场地保障。</p><h2>四、活动流程</h2><ul><li><strong>前期准备（活动前2周）：</strong>确定活动主题与方案，成立筹备小组；完成活动申报与审批；准备活动所需物资与设备</li><li><strong>活动当天：</strong>参加人员签到入场，活动正式开始，依次开展各环节，活动结束，合影留念</li><li><strong>后期收尾（活动后1周）：</strong>活动总结与资料归档，评选表彰，撰写通讯稿</li></ul><h2>五、安全保障</h2><p>活动前对场地进行全面安全检查；各班班主任全程随班负责；提前与校医室沟通，配备专业医护人员值守；制定突发情况应急预案。</p><p style="color:#aaa;font-size:12px;margin-top:24px;border-top:1px dashed #ddd;padding-top:12px;">* 此为历史记录，原始输入内容：' + item.content.substring(0, 120) + (item.content.length > 120 ? '...' : '') + '</p>';
      } else {
        bodyHtml = '<h2>' + item.title + '</h2>' + item.content.split(/[,。；\n]/).slice(0, 8).map(function(s) {

        }).join('') + '<p style="color:#aaa;font-size:12px;margin-top:24px;border-top:1px dashed #ddd;padding-top:12px;">* 此为历史记录，原始输入内容：' + item.content.substring(0, 120) + (item.content.length > 120 ? '...' : '') + '</p>';
      }

      // 将HTML转换为可编辑的格式化文本
      function htmlToEditableText(html) {
        if (!html) return '';
        var temp = document.createElement('div');
        temp.innerHTML = html;
        return htmlToTextNode(temp);
      }

      function htmlToTextNode(element) {
        var text = '';
        var children = element.childNodes;
        for (var i = 0; i < children.length; i++) {
          var node = children[i];
          if (node.nodeType === Node.TEXT_NODE) {
            text += node.textContent;
          } else if (node.nodeType === Node.ELEMENT_NODE) {
            var tagName = node.tagName.toLowerCase();
            if (tagName === 'h1' || tagName === 'h2' || tagName === 'h3' || tagName === 'h4') {
              if (text && !text.endsWith('\n\n')) text += '\n\n';
              text += node.textContent;
              if (!text.endsWith('\n')) text += '\n';
            } else if (tagName === 'p') {
              if (text && !text.endsWith('\n\n')) text += '\n\n';
              text += node.textContent;
            } else if (tagName === 'br') {
              text += '\n';
            } else if (tagName === 'ul' || tagName === 'ol') {
              var items = node.querySelectorAll('li');
              for (var j = 0; j < items.length; j++) {
                text += '• ' + items[j].textContent + '\n';
              }
              text += '\n';
            } else if (tagName === 'li') {
              text += '• ' + node.textContent + '\n';
            } else if (tagName === 'strong' || tagName === 'b' || tagName === 'em' || tagName === 'i' || tagName === 'span') {
              text += node.textContent;
            } else if (tagName === 'table') {
              var rows = node.querySelectorAll('tr');
              for (var r = 0; r < rows.length; r++) {
                var cells = rows[r].querySelectorAll('td, th');
                var rowText = [];
                for (var c = 0; c < cells.length; c++) {
                  rowText.push(cells[c].textContent.trim());
                }
                if (rowText.length > 0) {
                  text += rowText.join(' | ') + '\n';
                }
              }
              text += '\n';
            } else if (tagName === 'div') {
              text += htmlToTextNode(node);
            } else {
              text += node.textContent;
            }
          }
        }
        return text;
      }

      // 将编辑的文本转换回HTML
      function editableTextToHtml(text) {
        if (!text) return '';
        var lines = text.split('\n');
        var html = '';
        var inList = false;

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          var trimmedLine = line.trim();

          if (trimmedLine === '') {
            if (inList) {
              html += '</ul>';
              inList = false;
            }
            continue;
          }

          if (trimmedLine.startsWith('• ') || trimmedLine.startsWith('- ')) {
            if (!inList) {
              html += '<ul>';
              inList = true;
            }
            html += '<li>' + trimmedLine.substring(2) + '</li>';
          } else {
            if (inList) {
              html += '</ul>';
              inList = false;
            }

            if (/^[一二三四五六七八九十]、/.test(trimmedLine) ||
                /^第[一二三四五六七八九十\d]+[章节条点]/.test(trimmedLine) ||
                /^【.+】/.test(trimmedLine)) {
              html += '<h2>' + trimmedLine + '</h2>';
            } else {
              html += '<p>' + trimmedLine + '</p>';
            }
          }
        }

        if (inList) {
          html += '</ul>';
        }

        return html;
      }

      overlay.querySelector('#histDownloadBtn').onclick = function() {

        setTimeout(function() { b.textContent = '⬇ 下载'; }, 1500);
      };

      overlay.querySelector('#histSaveBtn').onclick = function() {

        var link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        var now = new Date();
        var dateStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
        link.download = item.title + '_' + dateStr + '.txt';
        link.click();
        var b = overlay.querySelector('#histSaveBtn');
        b.textContent = '✅ 已保存';
        setTimeout(function() { b.textContent = '💾 保存'; }, 1500);
      };

      overlay.querySelector('#histEditBtn').onclick = function() {

        bodyEl.innerHTML = '<textarea id="histEditor" style="width:100%;min-height:400px;padding:16px;border:1px solid #ddd;border-radius:8px;font-size:14px;line-height:1.8;resize:vertical;font-family:inherit;">' + editableText.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</textarea>';
        var btnContainer = overlay.querySelector('div[style*="display:flex"][style*="gap:8px"]');
        btnContainer.innerHTML = '<button id="histConfirmBtn" style="background:rgba(255,255,255,.9);border:none;color:#1B5EA7;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;">✅ 确认</button><button id="histCancelBtn" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;">✖ 取消</button><button id="histCloseBtn" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;">关闭</button>';
        overlay.querySelector('#histConfirmBtn').onclick = function() {
          var htmlContent = editableTextToHtml(document.getElementById('histEditor').value);
          bodyEl.innerHTML = htmlContent;
          btnContainer.innerHTML = '<button id="histDownloadBtn" style="background:rgba(255,255,255,.9);border:none;color:#1B5EA7;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;">⬇ 下载</button><button id="histSaveBtn" style="background:rgba(255,255,255,.9);border:none;color:#1B5EA7;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;">💾 保存</button><button id="histEditBtn" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;">✏️ 编辑</button><button id="histCloseBtn" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;">关闭</button>';
          overlay.querySelector('#histDownloadBtn').onclick = overlay.querySelector('#histDownloadBtn').onclick;
          overlay.querySelector('#histSaveBtn').onclick = overlay.querySelector('#histSaveBtn').onclick;
          overlay.querySelector('#histEditBtn').onclick = arguments.callee;
          overlay.querySelector('#histCloseBtn').onclick = function() { overlay.remove(); };
        };
        overlay.querySelector('#histCancelBtn').onclick = function() {
          bodyEl.innerHTML = originalContent;
          btnContainer.innerHTML = '<button id="histDownloadBtn" style="background:rgba(255,255,255,.9);border:none;color:#1B5EA7;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;">⬇ 下载</button><button id="histSaveBtn" style="background:rgba(255,255,255,.9);border:none;color:#1B5EA7;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;">💾 保存</button><button id="histEditBtn" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;">✏️ 编辑</button><button id="histCloseBtn" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;">关闭</button>';
          overlay.querySelector('#histDownloadBtn').onclick = overlay.querySelector('#histDownloadBtn').onclick;
          overlay.querySelector('#histSaveBtn').onclick = overlay.querySelector('#histSaveBtn').onclick;
          overlay.querySelector('#histEditBtn').onclick = arguments.callee;
          overlay.querySelector('#histCloseBtn').onclick = function() { overlay.remove(); };
        };
      };
      overlay.querySelector('#histCloseBtn').onclick = function() { overlay.remove(); };

      // 添加 h2 样式以匹配历史记录弹窗
      bodyEl.querySelectorAll('h2').forEach(function(h2) {
        h2.style.cssText = 'font-size:15px;color:#1B5EA7;margin:18px 0 8px;font-weight:700;border-left:3px solid #1B5EA7;padding-left:8px;';
      });
    }
